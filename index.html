<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landslide Monitoring System</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_kl5GyJHMI9_ZJP2lcwO_9Fyieu5u5V0",
  authDomain: "landslide-monitoring-sys-b4dd9.firebaseapp.com",
  databaseURL: "https://landslide-monitoring-sys-b4dd9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "landslide-monitoring-sys-b4dd9",
  storageBucket: "landslide-monitoring-sys-b4dd9.firebasestorage.app",
  messagingSenderId: "476478676047",
  appId: "1:476478676047:web:651523fc7c3297753c5e3a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
  
console.log("Firebase Loaded");
  
const landslideRef = ref(db, "landslide");
  
console.log("Listening to Firebase");
  
onValue(landslideRef, (snapshot) => {
  
  const data = snapshot.val();

  if (!data) return;

  document.getElementById("status").innerText = data.status ?? "-";
  document.getElementById("risk").innerText = data.risk ?? "-";
  document.getElementById("soil1").innerText = data.soil1 ?? "-";
  document.getElementById("soil2").innerText = data.soil2 ?? "-";
  document.getElementById("fsr").innerText = data.fsr ?? "-";
  document.getElementById("pitch").innerText = data.pitch ?? "-";
  document.getElementById("roll").innerText = data.roll ?? "-";

  if (data.status === "ALERT") {
    document.body.style.background = "#ffdddd";
  } else {
    document.body.style.background = "#ddffdd";
  }
});
</script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

.value{
    font-size:24px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>🌍 Landslide Monitoring System</h1>

<div class="card"><h2>Status</h2><div id="status" class="value">Loading...</div></div>

<div class="card"><h2>Risk Score</h2><div id="risk" class="value">0</div></div>

<div class="card"><h2>Soil 1</h2><div id="soil1" class="value">0</div></div>

<div class="card"><h2>Soil 2</h2><div id="soil2" class="value">0</div></div>

<div class="card"><h2>FSR</h2><div id="fsr" class="value">0</div></div>

<div class="card"><h2>Pitch</h2><div id="pitch" class="value">0</div></div>

<div class="card"><h2>Roll</h2><div id="roll" class="value">0</div></div>

</body>
</html>
